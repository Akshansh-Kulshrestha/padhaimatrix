{% extends "base.html" %}
{% block content %}

    <!-- Ask Div -->
    <div class="container-fluid py-5 practice-section">
      <div class="container">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center">
          <h3 class="text-white fw-bold text-center my-5">Ask Me Anything</h3>
        </div>
        <form action="/action_page.php">
          <div class="row">
            <div class="col">
              <label for="comment">Full Name</label>

              <input
                type="text"
                class="form-control mt-3"
                placeholder="Full Name"
                name="name"
              />
            </div>
            <div class="col">
              <label for="comment">Enter Email</label>

              <input
                type="email"
                class="form-control mt-3"
                placeholder="xyz@email.com"
                name="email"
              />
            </div>
            <div class="col">
              <label for="comment">Topic</label>

              <input
                type="text"
                class="form-control mt-3"
                placeholder="DSA"
                name="topic"
              />
            </div>
          </div>
          <div class="mb-3 mt-3">
            <label for="comment">Your Question:</label>
            <textarea
              class="form-control mt-3"
              rows="5"
              id="comment"
              name="text"
              placeholder="What is a Stack?"
            ></textarea>
          </div>
          <button type="submit" class="btn btn-success">Ask</button>
        </form>
      </div>
    </div>
{% endblock content %}
