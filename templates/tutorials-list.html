{% extends "base.html" %}
{% block content %}
       <!-- Tutorials Div -->
    <div class="container-fluid py-5 practice-section">
      <div class="container">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="text-white">Tutorials</h3>
     
        </div>

        <!-- Cards Row -->
        <div class="row g-4">
          {% for art in articles %}
          <div class="col-md-4">
            <div class="card custom-card">
              {% if art.image %}
              <img src="{{ art.image.url }}" class="card-img-top" alt="" />
              {% endif %}
              <div class="card-body">
                <h5 class="card-title">{{ art.name }}</h5>
                <p class="card-text">
                  {{ art.description }}
                </p>
                <div class="card-actions">
                  <a href="#" class="details-link">More Details</a>
<a href="{% url 'core:article_detail' subject_slug=art.slug topic_slug=art.topics.first.slug %}" class="btn card-btn">
    Start
</a>
                </div>
              </div>
            </div>
          </div>
          {% endfor %}  
        </div>
      </div>
    </div>
  {% endblock content %}
